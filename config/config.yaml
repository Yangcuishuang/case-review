engine:
  keyword:
    enabled: true
    keywords_dir: "data/keywords"
    min_keyword_length: 2
  rule:
    enabled: false
    rules_dir: "data/rules"
  llm:
    enabled: true
    api_url: ""
    api_key: ""
    model: ""
    temperature: 0.1
    max_tokens: 2048
    timeout: 60
    fewshot_file: "data/cases/all_examples.json"
    confidence_threshold: 0.6

penalty:
  manual_review_threshold: 0.6
  no_violation_threshold: 0.7

logging:
  level: "INFO"
